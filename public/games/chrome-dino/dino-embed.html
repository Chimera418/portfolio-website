<!DOCTYPE html>
<html dir="ltr" lang="en" class="offline">
<head>
  <meta charset="utf-8">
  <meta name="color-scheme" content="light dark">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Chrome Dino Embed</title>

  <link rel="stylesheet" href="styles/interstitial_core.css">
  <link rel="stylesheet" href="styles/interstitial_common.css">
  <link rel="stylesheet" href="styles/neterror.css">

  <!-- load_time_data MUST come before offline.js -->
  <script>const HIDDEN_CLASS = 'hidden';</script>
  <script src="scripts/load_time_data.js"></script>
  <script src="scripts/offline.js"></script>
  <script src="scripts/offline-sprite-definitions.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html {
      height: 100%;
    }

    body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      color: #333;
    }

    body.dark-mode {
      background: #202124;
      color: #eee;
    }

    /* The interstitial-wrapper – let it be full width so Runner sizes correctly */
    #main-frame-error,
    .interstitial-wrapper {
      width: 100% !important;
      max-width: 100% !important;
      padding: 0 !important;
      margin: 0 !important;
      display: flex !important;
      flex-direction: column !important;
      align-items: center !important;
    }

    .runner-container {
      display: block !important;
      width: 100% !important;
      max-width: 100% !important;
    }

    /* Center the canvas and make background transparent */
    .runner-canvas {
      display: block !important;
      position: absolute !important;
      left: 0;
      right: 0;
      margin: 0 auto;
      background: transparent !important;
    }

    /* Hide error-page chrome */
    #main-content,
    #sub-frame-error,
    .slow-speed-option,
    #offline-resources {
      display: none !important;
    }

    #hint {
      position: fixed;
      bottom: 8px;
      left: 0;
      right: 0;
      text-align: center;
      font: 11px/1.4 'Segoe UI', Tahoma, sans-serif;
      opacity: 0.45;
      pointer-events: none;
      transition: opacity 1s;
    }
  </style>
</head>
<body id="t" class="neterror">
  <!-- Runner attaches its canvas inside .interstitial-wrapper -->
  <div id="main-frame-error" class="interstitial-wrapper">
    <div id="main-content" style="display:none">
      <div class="icon icon-offline" style="visibility:hidden;"></div>
    </div>
  </div>

  <p id="hint">Tap, Space or ↑ to play</p>

  <!-- Hidden image resources -->
  <div id="offline-resources" style="display:none">
    <img id="offline-resources-1x" src="images/default_100_percent/offline/100-offline-sprite.png">
    <img id="offline-resources-2x" src="images/default_200_percent/offline/200-offline-sprite.png">
    <template id="audio-resources"></template>
  </div>

  <script>
    var params   = new URLSearchParams(location.search);
    var gameType = params.get('type') || '0';

    var typeMap = {
      '1': { specific1x: '100-olympics-hurdling-sprite.png',   specific2x: '200-olympics-hurdling-sprite.png'   },
      '2': { specific1x: '100-olympics-gymnastics-sprite.png', specific2x: '200-olympics-gymnastics-sprite.png' },
      '3': { specific1x: '100-olympics-surfing-sprite.png',    specific2x: '200-olympics-surfing-sprite.png'    },
      '4': { specific1x: '100-olympics-swimming-sprite.png',   specific2x: '200-olympics-swimming-sprite.png'   },
      '5': { specific1x: '100-olympics-equestrian-sprite.png', specific2x: '200-olympics-equestrian-sprite.png' },
    };

    var BASE1 = 'images/default_100_percent/offline/';
    var BASE2 = 'images/default_200_percent/offline/';
    var info   = typeMap[gameType];


    loadTimeData.data = {
      altGameType:            info ? gameType : '',
      enableAltGameMode:      !!info,
      altGameCommonImage1x:   BASE1 + '100-olympic-firemedal-sprite.png',
      altGameCommonImage2x:   BASE2 + '200-olympic-firemedal-sprite.png',
      altGameSpecificImage1x: info ? BASE1 + info.specific1x : '',
      altGameSpecificImage2x: info ? BASE2 + info.specific2x : '',
      dinoGameA11yAriaLabel:  '',
      dinoGameA11yDescription:'',
      dinoGameA11yGameOver:   'Game over, your score is $1.',
      dinoGameA11yHighScore:  'Your highest score is $1.',
      dinoGameA11yJump:       'Jump!',
      dinoGameA11ySpeedToggle:'Start slower',
      dinoGameA11yStartGame:  'Game started.',
      fontfamily:             "'Segoe UI', Tahoma, sans-serif",
      fontsize:               '75%',
      heading:                { hostName: 'dino', msg: 'Press space to play' },
      iconClass:              'icon-offline',
      language:               'en',
      textdirection:          'ltr',
      title:                  'chrome://dino/',
    };
  </script>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      new Runner('.interstitial-wrapper');

      // Force normal speed — disable the slow-start mode entirely
      Runner.slowDown = false;
      if (Runner.instance_) {
        Runner.instance_.config = Object.assign(Runner.instance_.config, Runner.normalConfig);
      }

      document.addEventListener('keydown', function hideHint() {
        var h = document.getElementById('hint');
        if (h) { h.style.opacity = '0'; setTimeout(function() { h.remove(); }, 1000); }
        document.removeEventListener('keydown', hideHint);
      });
      document.addEventListener('touchstart', function hideHintTouch() {
        var h = document.getElementById('hint');
        if (h) { h.style.opacity = '0'; setTimeout(function() { h.remove(); }, 1000); }
        document.removeEventListener('touchstart', hideHintTouch);
      });

      // Enable jumping via mouse click inside the iframe on PC
      document.addEventListener('pointerdown', function (e) {
        if (e.target && e.target.closest && e.target.closest('.dino-option')) return;
        var evDown = new KeyboardEvent('keydown', { bubbles: true, cancelable: true });
        Object.defineProperty(evDown, 'keyCode', { get: function() { return 32; } });
        Object.defineProperty(evDown, 'which', { get: function() { return 32; } });
        document.dispatchEvent(evDown);
        
        setTimeout(function() {
          var evUp = new KeyboardEvent('keyup', { bubbles: true, cancelable: true });
          Object.defineProperty(evUp, 'keyCode', { get: function() { return 32; } });
          Object.defineProperty(evUp, 'which', { get: function() { return 32; } });
          document.dispatchEvent(evUp);
        }, 150);
      }, true);

      // Monkey-patch gameOver to post score
      var originalGameOver = Runner.prototype.gameOver;
      Runner.prototype.gameOver = function() {
        originalGameOver.apply(this, arguments);
        var currentScore = Math.floor(this.distanceMeter.getActualDistance(Math.ceil(this.distanceRan)));
        window.parent.postMessage({ type: 'GAME_OVER', game: 'chrome-dino', score: currentScore }, '*');
      };
    });

    // Relay events from parent
    window.addEventListener('message', function (e) {
      if (!e.data) return;
      if (e.data.type === 'KEY') {
        var ev = new KeyboardEvent(e.data.eventType, { bubbles: true, cancelable: true });
        Object.defineProperty(ev, 'keyCode', { get: function() { return e.data.keyCode; } });
        Object.defineProperty(ev, 'which', { get: function() { return e.data.keyCode; } });
        document.dispatchEvent(ev);
      } else if (e.data.type === 'THEME') {
        var isDark = e.data.theme !== 'latte';
        if (isDark) {
          document.body.classList.add('dark-mode');
        } else {
          document.body.classList.remove('dark-mode');
        }
        if (window.Runner && Runner.instance_) {
          Runner.instance_.isDarkMode = isDark;
        }
      } else if (e.data.type === 'PAUSE') {
        if (window.Runner && Runner.instance_ && Runner.instance_.playing && !Runner.instance_.crashed) {
          Runner.instance_.stop();
        }
      } else if (e.data.type === 'RESUME') {
        if (window.Runner && Runner.instance_ && Runner.instance_.paused && !Runner.instance_.crashed) {
          Runner.instance_.play();
        }
      }
    });
  </script>
</body>
</html>
